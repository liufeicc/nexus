<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松鼠 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    min-height: 100vh;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 40px;
    color: #e0e0e0;
  }

  .section {
    margin-bottom: 50px;
    text-align: center;
  }

  .section h2 {
    font-size: 16px;
    color: #a0a0b8;
    margin-bottom: 20px;
  }

  /* ====== Emoji 大小对比 ====== */
  .emoji-row {
    display: flex;
    gap: 32px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .emoji-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .emoji-label {
    font-size: 12px;
    color: #8080a0;
  }

  .emoji-20 { font-size: 20px; line-height: 1; }
  .emoji-28 { font-size: 28px; line-height: 1; }
  .emoji-36 { font-size: 36px; line-height: 1; }
  .emoji-48 { font-size: 48px; line-height: 1; }

  /* ====== 标题栏移动 Demo ====== */
  .titlebar-demo {
    width: 700px;
    height: 36px;
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
  }

  .titlebar-tab {
    position: absolute;
    top: 0;
    height: 100%;
    border-right: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 13px;
    color: #a0a0b8;
    background: #1a1a2e;
  }

  .titlebar-tab.active {
    background: #2a2a4a;
    color: #e0e0e0;
  }

  .titlebar-tab.tab-1 { left: 0; width: 120px; }
  .titlebar-tab.tab-2 { left: 120px; width: 140px; }
  .titlebar-tab.tab-3 { left: 260px; width: 160px; }
  .titlebar-tab.tab-4 { left: 420px; width: 130px; }

  .titlebar-squirrel {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    line-height: 1;
    transition: left 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .titlebar-squirrel.facing-right {
    transform: translateY(-50%) scaleX(-1);
  }

  .titlebar-squirrel.facing-left {
    transform: translateY(-50%) scaleX(1);
  }

  .titlebar-squirrel.run-anim {
    animation: titlebarRun 0.2s ease-in-out infinite alternate;
  }

  .titlebar-squirrel.run-anim.facing-right {
    animation: titlebarRunRight 0.2s ease-in-out infinite alternate;
  }

  .titlebar-squirrel.run-anim.facing-left {
    animation: titlebarRunLeft 0.2s ease-in-out infinite alternate;
  }

  @keyframes titlebarRunRight {
    0%   { transform: translateY(-50%) scaleX(-1) translateY(-1px); }
    100% { transform: translateY(-50%) scaleX(-1) translateY(1px); }
  }

  @keyframes titlebarRunLeft {
    0%   { transform: translateY(-50%) translateY(-1px); }
    100% { transform: translateY(-50%) translateY(1px); }
  }

  .demo-controls {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    justify-content: center;
  }

  .demo-controls button {
    padding: 6px 16px;
    background: #2a2a4a;
    color: #e0e0e0;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }

  .demo-controls button:hover {
    background: #3a3a5a;
  }

  /* ====== 传送门 — 发光的门 ====== */
  .portal-demo {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .portal-door {
    position: relative;
    width: 30px;
    height: 30px;
  }

  .portal-door .door-frame {
    position: absolute;
    inset: -2px;
    border-radius: 15px;
    border: 2px solid #7ec8e3;
    box-shadow:
      0 0 6px rgba(126, 200, 227, 0.6),
      0 0 16px rgba(126, 200, 227, 0.3),
      inset 0 0 6px rgba(126, 200, 227, 0.2);
    animation: doorGlow 2s ease-in-out infinite;
  }

  @keyframes doorGlow {
    0%, 100% {
      box-shadow:
        0 0 6px rgba(126, 200, 227, 0.6),
        0 0 16px rgba(126, 200, 227, 0.3),
        inset 0 0 6px rgba(126, 200, 227, 0.2);
      border-color: #7ec8e3;
    }
    50% {
      box-shadow:
        0 0 10px rgba(126, 200, 227, 0.9),
        0 0 24px rgba(126, 200, 227, 0.5),
        0 0 40px rgba(126, 200, 227, 0.2),
        inset 0 0 10px rgba(126, 200, 227, 0.4);
      border-color: #a0dff5;
    }
  }

  .portal-door .door-inner {
    position: absolute;
    inset: 0;
    border-radius: 13px;
    background: radial-gradient(circle at center, rgba(126, 200, 227, 0.4) 0%, rgba(126, 200, 227, 0.05) 70%, transparent 100%);
    overflow: hidden;
  }

  .portal-door .door-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #7ec8e3;
    opacity: 0.7;
  }

  .portal-door .door-particle:nth-child(1) {
    top: 30%; left: 30%;
    animation: particleFloat1 3s ease-in-out infinite;
  }
  .portal-door .door-particle:nth-child(2) {
    top: 55%; left: 55%;
    animation: particleFloat2 2.5s ease-in-out infinite;
    animation-delay: 0.5s;
  }
  .portal-door .door-particle:nth-child(3) {
    top: 65%; left: 35%;
    animation: particleFloat3 3.5s ease-in-out infinite;
    animation-delay: 1s;
  }

  @keyframes particleFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
    50% { transform: translate(4px, -5px) scale(1.5); opacity: 1; }
  }
  @keyframes particleFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
    50% { transform: translate(-3px, 4px) scale(1.3); opacity: 1; }
  }
  @keyframes particleFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
    50% { transform: translate(5px, 3px) scale(1.4); opacity: 0.9; }
  }

  .portal-door .door-bottom-glow {
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(126, 200, 227, 0.5) 0%, transparent 70%);
    animation: bottomGlow 2s ease-in-out infinite;
  }

  @keyframes bottomGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .portal-door .door-star {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    animation: starTwinkle 1.5s ease-in-out infinite;
  }

  @keyframes starTwinkle {
    0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(0.8); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
  }

  .portal-emoji {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    animation: portalAppear 2s ease-in-out infinite;
  }

  @keyframes portalAppear {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0) translateY(6px); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1) translateY(0); }
    30%  { transform: translate(-50%, -50%) scale(1) translateY(0); }
    70%  { transform: translate(-50%, -50%) scale(1) translateY(0); }
    85%  { opacity: 1; transform: translate(-50%, -50%) scale(1) translateY(0); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0) translateY(-6px); }
  }

  /* ====== 状态展示 ====== */
  .states-row {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 700px;
  }

  .state-card {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 10px;
    padding: 12px 16px;
    text-align: center;
    min-width: 80px;
  }

  .state-card .emoji {
    font-size: 28px;
    line-height: 1;
    display: block;
    margin-bottom: 6px;
  }

  .state-card .state-label {
    font-size: 11px;
    color: #8080a0;
  }

  .state-card .state-anim-idle .emoji {
    animation: idleFloat 2s ease-in-out infinite;
  }

  @keyframes idleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .state-card .state-anim-alert .emoji {
    animation: alertShake 0.5s ease-in-out infinite;
  }

  @keyframes alertShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }

  .state-card .state-anim-error .emoji {
    animation: errorShake 0.4s ease-in-out infinite;
  }

  @keyframes errorShake {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  .state-card .state-anim-happy .emoji {
    animation: happyBounce 0.6s ease-in-out infinite;
  }

  @keyframes happyBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.1); }
  }

  .state-card .state-anim-thinking .emoji {
    animation: none;
  }

  .state-card .state-anim-sleeping .emoji {
    animation: sleepBreathe 3s ease-in-out infinite;
  }

  @keyframes sleepBreathe {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.05); opacity: 1; }
  }

  .overlay-text {
    position: absolute;
    font-size: 10px;
    color: #a0a0b8;
    white-space: nowrap;
  }

  .overlay-dots {
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    animation: dotsPulse 1.5s ease-in-out infinite;
  }

  @keyframes dotsPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .overlay-alert {
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    animation: alertPop 1s ease-in-out infinite;
  }

  @keyframes alertPop {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.3); }
  }

  .overlay-z {
    top: -14px;
    right: -4px;
    font-style: italic;
    animation: zFloat 3s ease-in-out infinite;
  }

  @keyframes zFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(-12px) translateX(8px); opacity: 0; }
  }

  /* ====== 云朵气泡（在松鼠左/右侧） ====== */
  .cloud-speech-wrap {
    display: inline-flex;
    align-items: center;
    position: relative;
    gap: 12px;
  }

  .cloud-squirrel {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
  }

  .cloud-bubble {
    position: relative;
    background: #f0f0f5;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 13px;
    color: #2d2d2d;
    max-width: 320px;
    min-width: 0;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    overflow: hidden;
    transition: max-width 0.15s ease-out;
    white-space: nowrap;
  }

  .bubble-text {
    display: inline;
  }

  /* 云朵边缘圆泡 — 面向右时朝左连接 */
  .direction-right .cloud-bubble::before {
    content: '';
    position: absolute;
    top: 6px;
    left: -10px;
    width: 14px;
    height: 14px;
    background: #f0f0f5;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .direction-right .cloud-bubble::after {
    content: '';
    position: absolute;
    top: 2px;
    left: -16px;
    width: 10px;
    height: 10px;
    background: #f0f0f5;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  /* 云朵边缘圆泡 — 面向左时朝右连接 */
  .direction-left .cloud-bubble::before {
    content: '';
    position: absolute;
    top: 6px;
    right: -10px;
    width: 14px;
    height: 14px;
    background: #f0f0f5;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .direction-left .cloud-bubble::after {
    content: '';
    position: absolute;
    top: 2px;
    right: -16px;
    width: 10px;
    height: 10px;
    background: #f0f0f5;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }

  .cloud-bubble .cursor {
    display: inline-block;
    width: 2px;
    height: 14px;
    background: #2d2d2d;
    animation: cursorBlink 0.6s step-end infinite;
    vertical-align: text-bottom;
  }

  @keyframes cursorBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<h1>🐿️ 松鼠智能体 Demo</h1>

<!-- ====== Emoji 大小对比 ====== -->
<div class="section">
  <h2>Emoji 尺寸对比</h2>
  <div class="emoji-row">
    <div class="emoji-item">
      <span class="emoji-20">🐿️</span>
      <span class="emoji-label">20px</span>
    </div>
    <div class="emoji-item">
      <span class="emoji-28">🐿️</span>
      <span class="emoji-label">28px</span>
    </div>
    <div class="emoji-item">
      <span class="emoji-36">🐿️</span>
      <span class="emoji-label">36px</span>
    </div>
    <div class="emoji-item">
      <span class="emoji-48">🐿️</span>
      <span class="emoji-label">48px</span>
    </div>
  </div>
</div>

<!-- ====== 状态展示 ====== -->
<div class="section">
  <h2>状态展示（28px）</h2>
  <div class="states-row">
    <div class="state-card">
      <div class="state-anim-idle">
        <span class="emoji">🐿️</span>
      </div>
      <div class="state-label">idle</div>
    </div>
    <div class="state-card">
      <div class="state-anim-thinking" style="position:relative">
        <span class="overlay-text overlay-dots">...</span>
        <span class="emoji">🐿️</span>
      </div>
      <div class="state-label">thinking</div>
    </div>
    <div class="state-card">
      <div class="state-anim-alert" style="position:relative">
        <span class="overlay-text overlay-alert">❗</span>
        <span class="emoji">🐿️</span>
      </div>
      <div class="state-label">alert</div>
    </div>
    <div class="state-card">
      <div class="state-anim-error">
        <span class="emoji">🐿️</span>
      </div>
      <div class="state-label">error</div>
    </div>
    <div class="state-card">
      <div class="state-anim-happy">
        <span class="emoji">🐿️</span>
      </div>
      <div class="state-label">happy</div>
    </div>
    <div class="state-card">
      <div class="state-anim-sleeping" style="position:relative">
        <span class="overlay-text overlay-z">z</span>
        <span class="emoji">🐿️</span>
      </div>
      <div class="state-label">sleeping</div>
    </div>
  </div>
</div>

<!-- ====== 标题栏移动 ====== -->
<div class="section">
  <h2>标题栏移动</h2>
  <div class="titlebar-demo" id="titlebarDemo">
    <div class="titlebar-tab tab-1 active">终端</div>
    <div class="titlebar-tab tab-2">文件浏览器</div>
    <div class="titlebar-tab tab-3">浏览器</div>
    <div class="titlebar-tab tab-4">设置</div>
    <span class="titlebar-squirrel facing-right" id="titlebarSquirrel" style="left: 60px;">🐿️</span>
  </div>
  <div class="demo-controls">
    <button onclick="moveTo(60)">终端</button>
    <button onclick="moveTo(190)">文件浏览器</button>
    <button onclick="moveTo(340)">浏览器</button>
    <button onclick="moveTo(485)">设置</button>
    <button onclick="moveRandom()">随机移动</button>
  </div>
</div>

<!-- ====== 传送门 ====== -->
<div class="section">
  <h2>传送门效果</h2>
  <div class="portal-demo">
    <div class="portal-door">
      <div class="door-star">✦</div>
      <div class="door-frame"></div>
      <div class="door-inner">
        <div class="door-particle"></div>
        <div class="door-particle"></div>
        <div class="door-particle"></div>
      </div>
      <div class="door-bottom-glow"></div>
      <span class="portal-emoji">🐿️</span>
    </div>
  </div>
</div>

<!-- ====== 云朵气泡 ====== -->
<div class="section">
  <h2>云朵气泡</h2>
  <div style="display:flex; gap:60px; justify-content:center; flex-wrap:wrap;">
    <!-- 面向右：松鼠在左，气泡在右 -->
    <div style="text-align:center;">
      <div class="cloud-speech-wrap direction-right">
        <span class="cloud-squirrel">🐿️</span>
        <div class="cloud-bubble" id="bubbleRight">
          <span class="bubble-text" id="speechTextRight"></span><span class="cursor" id="cursorRight"></span>
        </div>
      </div>
      <div style="font-size:11px;color:#8080a0;margin-top:8px;">面向右 → 气泡在右边</div>
    </div>
    <!-- 面向左：气泡在左，松鼠在右 -->
    <div style="text-align:center;">
      <div class="cloud-speech-wrap direction-left">
        <div class="cloud-bubble" id="bubbleLeft">
          <span class="bubble-text" id="speechTextLeft"></span><span class="cursor" id="cursorLeft"></span>
        </div>
        <span class="cloud-squirrel">🐿️</span>
      </div>
      <div style="font-size:11px;color:#8080a0;margin-top:8px;">面向左 → 气泡在左边</div>
    </div>
  </div>
</div>

<script>
  // ====== 标题栏移动（带方向） ======
  const squirrel = document.getElementById('titlebarSquirrel');
  let currentPos = 60;

  function moveTo(x) {
    const goingLeft = x < currentPos;
    currentPos = x;

    if (!goingLeft) {
      squirrel.classList.add('facing-right');
      squirrel.classList.remove('facing-left');
    } else {
      squirrel.classList.add('facing-left');
      squirrel.classList.remove('facing-right');
    }

    squirrel.classList.add('run-anim');
    squirrel.style.left = x + 'px';
    setTimeout(() => {
      squirrel.classList.remove('run-anim');
    }, 1000);
  }

  function moveRandom() {
    const positions = [60, 190, 340, 485];
    const randomPos = positions[Math.floor(Math.random() * positions.length)];
    moveTo(randomPos);
  }

  // ====== 打字机效果 + 气泡延伸 ======
  const messages = [
    '你好！我是小松鼠 🐿️',
    '这里好像有点问题...',
    '命令执行成功！',
    '需要帮忙吗？',
    '这个文件可以这样改...',
  ];
  let msgIndex = 0;
  const speechTextRight = document.getElementById('speechTextRight');
  const speechTextLeft = document.getElementById('speechTextLeft');
  const bubbleRight = document.getElementById('bubbleRight');
  const bubbleLeft = document.getElementById('bubbleLeft');
  const cursorRight = document.getElementById('cursorRight');
  const cursorLeft = document.getElementById('cursorLeft');

  /**
   * 测量完整文本的实际宽度
   * 创建一个离屏元素来测量文字渲染后的真实宽度
   */
  function measureTextWidth(text) {
    const measurer = document.createElement('span');
    measurer.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-size:13px;padding:0 14px;font-family:inherit;';
    measurer.textContent = text;
    document.body.appendChild(measurer);
    const width = measurer.getBoundingClientRect().width;
    document.body.removeChild(measurer);
    return width;
  }

  function typeMessage() {
    const msg = messages[msgIndex];
    const fullTextWidth = measureTextWidth(msg);

    // 重置状态
    speechTextRight.textContent = '';
    speechTextLeft.textContent = '';
    bubbleRight.style.maxWidth = '0px';
    bubbleLeft.style.maxWidth = '0px';
    cursorRight.style.display = 'inline-block';
    cursorLeft.style.display = 'inline-block';

    let i = 0;
    const interval = setInterval(() => {
      // 逐字添加到文本
      speechTextRight.textContent += msg[i];
      speechTextLeft.textContent = msg[i] + speechTextLeft.textContent;
      i++;

      // 根据已输入文字动态扩展气泡宽度
      const currentText = msg.substring(0, i);
      const currentWidth = measureTextWidth(currentText);
      // 添加 padding 和最小余量
      const paddedWidth = currentWidth + 4;
      bubbleRight.style.maxWidth = paddedWidth + 'px';
      bubbleLeft.style.maxWidth = paddedWidth + 'px';

      if (i >= msg.length) {
        clearInterval(interval);
        // 打字完成，隐藏光标
        cursorRight.style.display = 'none';
        cursorLeft.style.display = 'none';

        msgIndex = (msgIndex + 1) % messages.length;
        setTimeout(typeMessage, 3000);
      }
    }, 50);
  }
