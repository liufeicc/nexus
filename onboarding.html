<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus 首次设置</title>
  <style>
    /* 最小化样式，仅支持 onboarding 窗口 */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f7fa;
      --bg-input: #ffffff;
      --border-color: #e2e8f0;
      --text-primary: #1a202c;
      --text-secondary: #718096;
      --accent-color: #4a90d9;
      --accent-hover: #3a7bc8;
      --danger-color: #e53e3e;
      --success-color: #38a169;
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; font-family: var(--font-family); background: var(--bg-secondary); color: var(--text-primary); }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/renderer/onboarding-entry.tsx"></script>
</body>
</html>
