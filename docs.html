      function buildToc() {
        var toc = document.getElementById('docsToc');
        if (!toc) return;
        toc.innerHTML = '';
        var lang = document.documentElement.lang || 'zh';
        for (var i = 0; i < TOC_STRUCTURE.length; i++) {
          var item = TOC_STRUCTURE[i];
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#' + item.id;
          a.setAttribute('data-docs-toc', item.id);
          if (item.sub) a.className = 'sub';
          var parts = item.titleKey.split('.');
          var val = I18N[lang];
          for (var j = 0; j < parts.length; j++) {
            if (val == null) break;
            val = val[parts[j]];
          }
          a.textContent = val || item.titleKey;
          a.addEventListener('click', function(e) {
            e.preventDefault();
            var target = document.getElementById(this.getAttribute('data-docs-toc'));
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          li.appendChild(a);
          toc.appendChild(li);
        }
      }

      function updateActiveToc() {
        var headings = document.querySelectorAll('.docs-content h2, .docs-content h3');
        var tocLinks = document.querySelectorAll('.docs-toc a');
        if (!headings.length || !tocLinks.length) return;
        var scrollPos = window.scrollY + 100;
        var activeId = '';
        for (var i = headings.length - 1; i >= 0; i--) {
          if (headings[i].offsetTop <= scrollPos) { activeId = headings[i].id; break; }
        }
        tocLinks.forEach(function(link) {
          link.classList.toggle('active', link.getAttribute('data-docs-toc') === activeId);
        });
      }

      var langObserver = new MutationObserver(function() { buildToc(); updateActiveToc(); });
      langObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });

      window.addEventListener('scroll', function() { requestAnimationFrame(updateActiveToc); });

      buildToc();
      setTimeout(function() { buildToc(); updateActiveToc(); }, 100);
    })();
