<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus 浏览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 32px;
    }

    .search-box {
      display: flex;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 4px;
      backdrop-filter: blur(10px);
    }

    .search-box input {
      flex: 1;
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .search-box button {
      padding: 12px 24px;
      border: none;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-box button:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .shortcuts {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      color: #fff;
      min-width: 80px;
    }

    .shortcut:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .shortcut-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .shortcut-name {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌐</div>
    <h1>Nexus 浏览器</h1>
    <p>在终端中浏览网页</p>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入网址或搜索内容..." autofocus>
      <button onclick="search()">搜索</button>
    </div>

    <div class="shortcuts">
      <a class="shortcut" onclick="navigate('https://www.google.com')">
        <span class="shortcut-icon">🔍</span>
        <span class="shortcut-name">Google</span>
      </a>
      <a class="shortcut" onclick="navigate('https://github.com')">
        <span class="shortcut-icon">🐙</span>
        <span class="shortcut-name">GitHub</span>
      </a>
      <a class="shortcut" onclick="navigate('https://stackoverflow.com')">
        <span class="shortcut-icon">📚</span>
        <span class="shortcut-name">Stack Overflow</span>
      </a>
      <a class="shortcut" onclick="navigate('https://news.ycombinator.com')">
        <span class="shortcut-icon">📰</span>
        <span class="shortcut-name">Hacker News</span>
      </a>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput')

    // 回车搜索
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        search()
      }
    })

    // 搜索功能
    function search() {
      const query = searchInput.value.trim()
      if (query) {
        // 判断是 URL 还是搜索关键词
        if (query.includes('.') && !query.includes(' ')) {
          navigate(query.startsWith('http') ? query : 'https://' + query)
        } else {
          navigate('https://www.google.com/search?q=' + encodeURIComponent(query))
        }
      }
    }

    // 导航到 URL（通过 window.location 用于独立打开时）
    function navigate(url) {
      window.location.href = url
    }
  </script>
</body>
</html>
